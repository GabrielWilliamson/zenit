name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  AVALONIA_TELEMETRY_OPTOUT: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Zenit.sln

      - name: Build
        run: dotnet build Zenit.sln -c Release --no-restore

      - name: Publish ${{ matrix.runtime }}
        run: >
          dotnet publish Zenit.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          --no-restore
          -o artifacts/publish/${{ matrix.runtime }}
