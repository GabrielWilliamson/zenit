name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  AVALONIA_TELEMETRY_OPTOUT: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Zenit.sln

      - name: Build
        run: dotnet build Zenit.sln -c Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish Zenit.csproj
          -c Release
          -r win-x64
          --self-contained true
          --no-restore
          -o artifacts/publish/win-x64
