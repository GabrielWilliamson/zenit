name: release-velopack

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: Zenit.csproj
  PUBLISH_DIR: artifacts/publish/win-x64
  PORTABLE_DIR: artifacts/portable
  RELEASE_DIR: artifacts/velopack/win-x64
  APP_ID: Zenit
  APP_TITLE: Zenit
  MAIN_EXE: zenit.exe
  VELOPACK_VERSION: 0.0.1298
  WINDOWS_RUNTIME: win-x64
  AVALONIA_TELEMETRY_OPTOUT: 1

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable semver tag like v1.2.3, got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish app
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ env.WINDOWS_RUNTIME }}
          --self-contained true
          --no-restore
          -p:Version=${{ steps.version.outputs.value }}
          -o ${{ env.PUBLISH_DIR }}

      - name: Archive portable Windows bundle
        id: portable_win
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.PUBLISH_DIR }}"
          $portableDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.PORTABLE_DIR }}"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $assetPath = Join-Path $portableDir "${{ env.APP_TITLE }}-$env:VERSION-${{ env.WINDOWS_RUNTIME }}-portable.zip"
          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $assetPath
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI
        shell: bash
        run: |
          dotnet tool install --global vpk --version "$VELOPACK_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Pack and upload release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk download github \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --channel win \
            --outputDir "$RELEASE_DIR"

          vpk pack \
            --packId "$APP_ID" \
            --packVersion "${{ steps.version.outputs.value }}" \
            --packDir "$PUBLISH_DIR" \
            --mainExe "$MAIN_EXE" \
            --packTitle "$APP_TITLE" \
            --runtime win-x64 \
            --channel win \
            --outputDir "$RELEASE_DIR"

          vpk upload github \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --publish \
            --merge \
            --channel win \
            --outputDir "$RELEASE_DIR" \
            --releaseName "$APP_TITLE ${{ steps.version.outputs.value }}" \
            --tag "v${{ steps.version.outputs.value }}" \
            --targetCommitish "${{ github.sha }}"

      - name: Upload portable Windows bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
          ASSET_PATH: ${{ steps.portable_win.outputs.asset_path }}
        run: |
          gh release upload "v$env:VERSION" "$env:ASSET_PATH" --clobber
