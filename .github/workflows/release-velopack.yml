name: release-velopack

# Publica builds de Velopack en Supabase Storage (API S3 compatible).
#
# Secrets requeridos en GitHub (Settings → Secrets and variables → Actions):
#   SUPABASE_S3_ACCESS_KEY_ID      Access Key ID (Supabase → Project Settings → Storage → S3)
#   SUPABASE_S3_SECRET_ACCESS_KEY  Secret Access Key
#   SUPABASE_S3_ENDPOINT           https://<project_ref>.storage.supabase.co/storage/v1/s3
#   SUPABASE_S3_REGION             Region del proyecto (ej. us-east-1)
#   SUPABASE_STORAGE_BUCKET        Nombre del bucket (ej. zenit-releases)
#
# Opcional:
#   SUPABASE_STORAGE_PREFIX        Prefijo dentro del bucket (default: zenit)
#
# URL del feed para AppUpdateFeedUrl (bucket publico):
#   https://<project_ref>.supabase.co/storage/v1/object/public/<bucket>/<prefix>/win

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PROJECT_PATH: Zenit.csproj
  PUBLISH_DIR: artifacts/publish/win-x64
  PORTABLE_DIR: artifacts/portable
  RELEASE_DIR: artifacts/velopack/win-x64
  APP_ID: Zenit
  APP_TITLE: Zenit
  MAIN_EXE: Zenit.exe
  VELOPACK_VERSION: 1.2.0
  WINDOWS_RUNTIME: win-x64
  LINUX_RUNTIME: linux-x64
  AVALONIA_TELEMETRY_OPTOUT: 1
  SUPABASE_STORAGE_PREFIX: ${{ vars.SUPABASE_STORAGE_PREFIX || 'zenit' }}

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semver tag like v1.2.3, got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish app
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ env.WINDOWS_RUNTIME }}
          --self-contained true
          --no-restore
          -p:Version=${{ steps.version.outputs.value }}
          -o ${{ env.PUBLISH_DIR }}

      - name: Archive portable Windows bundle
        id: portable_win
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.PUBLISH_DIR }}"
          $portableDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.PORTABLE_DIR }}"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $assetPath = Join-Path $portableDir "${{ env.APP_TITLE }}-$env:VERSION-${{ env.WINDOWS_RUNTIME }}-portable.zip"
          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $assetPath
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI
        shell: bash
        run: |
          dotnet tool install --global vpk --version "$VELOPACK_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Pack and upload release to Supabase
        shell: bash
        env:
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_PREFIX: ${{ env.SUPABASE_STORAGE_PREFIX }}
        run: |
          set -euo pipefail

          WIN_PREFIX="${SUPABASE_STORAGE_PREFIX%/}/win"

          vpk download s3 \
            --bucket "$SUPABASE_STORAGE_BUCKET" \
            --endpoint "$SUPABASE_S3_ENDPOINT" \
            --region "$SUPABASE_S3_REGION" \
            --keyId "$SUPABASE_S3_ACCESS_KEY_ID" \
            --secret "$SUPABASE_S3_SECRET_ACCESS_KEY" \
            --channel win \
            --prefix "$WIN_PREFIX" \
            --outputDir "$RELEASE_DIR" \
            || echo "No previous Velopack release found in Supabase; creating the first one."

          vpk pack \
            --packId "$APP_ID" \
            --packVersion "${{ steps.version.outputs.value }}" \
            --packDir "$PUBLISH_DIR" \
            --mainExe "$MAIN_EXE" \
            --packTitle "$APP_TITLE" \
            --runtime win-x64 \
            --channel win \
            --outputDir "$RELEASE_DIR"

          vpk upload s3 \
            --bucket "$SUPABASE_STORAGE_BUCKET" \
            --endpoint "$SUPABASE_S3_ENDPOINT" \
            --region "$SUPABASE_S3_REGION" \
            --keyId "$SUPABASE_S3_ACCESS_KEY_ID" \
            --secret "$SUPABASE_S3_SECRET_ACCESS_KEY" \
            --channel win \
            --prefix "$WIN_PREFIX" \
            --outputDir "$RELEASE_DIR" \
            --keepMaxReleases 10

      - name: Upload portable Windows bundle to Supabase
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_PREFIX: ${{ env.SUPABASE_STORAGE_PREFIX }}
          VERSION: ${{ steps.version.outputs.value }}
          ASSET_PATH: ${{ steps.portable_win.outputs.asset_path }}
        run: |
          set -euo pipefail

          OBJECT_KEY="${SUPABASE_STORAGE_PREFIX%/}/portable/${{ env.APP_TITLE }}-${VERSION}-${{ env.WINDOWS_RUNTIME }}-portable.zip"
          aws s3 cp "$ASSET_PATH" "s3://${SUPABASE_STORAGE_BUCKET}/${OBJECT_KEY}" \
            --endpoint-url "$SUPABASE_S3_ENDPOINT"

  linux-portable:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish app
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ env.LINUX_RUNTIME }}
          --self-contained true
          --no-restore
          -p:Version=$VERSION
          -o artifacts/publish/${{ env.LINUX_RUNTIME }}

      - name: Archive portable Linux bundle
        id: portable_linux
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          mkdir -p "${{ env.PORTABLE_DIR }}"
          asset_path="${{ env.PORTABLE_DIR }}/${{ env.APP_TITLE }}-$VERSION-${{ env.LINUX_RUNTIME }}-portable.tar.gz"
          tar -C "artifacts/publish/${{ env.LINUX_RUNTIME }}" -czf "$asset_path" .
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload portable Linux bundle to Supabase
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_PREFIX: ${{ env.SUPABASE_STORAGE_PREFIX }}
          VERSION: ${{ needs.release.outputs.version }}
          ASSET_PATH: ${{ steps.portable_linux.outputs.asset_path }}
        run: |
          set -euo pipefail

          OBJECT_KEY="${SUPABASE_STORAGE_PREFIX%/}/portable/${{ env.APP_TITLE }}-${VERSION}-${{ env.LINUX_RUNTIME }}-portable.tar.gz"
          aws s3 cp "$ASSET_PATH" "s3://${SUPABASE_STORAGE_BUCKET}/${OBJECT_KEY}" \
            --endpoint-url "$SUPABASE_S3_ENDPOINT"
